name: Update Content and Deploy Page

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 16,17,18,19,20,21,22,23 * * *'
    - cron: '*/10 0,1,2 * * *'
    - cron: '*/10 3,4 * * *'
  push:
    branches:
      - main

env:
  DOCS_PATH: src/championships/2026_world_cup/reports/html

concurrency:
  group: deploy-workflow
  cancel-in-progress: true # Se um novo cron começar, cancela o anterior para não acumular fila

jobs:
  update-content:
    runs-on: ubuntu-latest
    permissions:
      contents: read     # Mudado para READ (não precisa mais escrever no Git)
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          activate-environment: true

      - name: Setup python and libs
        run: |
          uv python install
          uv sync
          uv pip install -e .

      # Seu DAG / Task do Airflow roda aqui
      - name: Run update content
        run: |
          ss run 2026_world_cup

      # O deploy lê a pasta gerada localmente no runner e publica no site
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static files as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DOCS_PATH }}

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: update-content
    if: success()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
