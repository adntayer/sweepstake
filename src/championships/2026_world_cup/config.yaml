# Playoff bonus scoring (per correct pick per phase)
playoff_scoring:
  segunda_fase: 4
  oitavas: 8
  quartas: 12
  semi: 20
  final: 30
  campeao: 45

# Striker scoring (points if player's pick matches actual_top_scorer)
striker_scoring:
  points: 25

# Actual top scorer of the championship
actual_top_scorer: "Harry Kane"

# Scoring rules (checked in rule order)
scoring:
  - name: "1-Placar exato"
    rule: "exact_score"
    points: 15
    priority: 1
    emoji: "🎯"
    description: "Acertou o placar exato da partida"
    color_text: "#00cc00"
  - name: "2-Vencedor + gols de um time (erro <= 2)"
    rule: "correct_winner_and_one_goal"
    points: 10
    priority: 2
    max_total_error: 2
    emoji: "🥅"
    description: "Acertou o vencedor e o nº de gols de um time, com erro total ≤ 2"
    color_text: "#66ff66"
  - name: "3-Vencedor + diferenca de gols (erro <= 2)"
    rule: "correct_winner_and_goal_diff"
    points: 7
    priority: 3
    max_total_error: 2
    emoji: "📊"
    description: "Acertou o vencedor e a diferença de gols, com erro ≤ 2"
    color_text: "#66ff66"
  - name: "4-Empate c/ erro total <= 2"
    rule: "correct_draw_and_low_error"
    points: 7
    priority: 4
    max_total_error: 2
    emoji: "🤝"
    description: "Acertou o empate com erro total ≤ 2"
    color_text: "#ffcc00"
  - name: "5-Vencedor + gols de um time (erro > 2)"
    rule: "correct_winner_and_one_goal"
    points: 7
    priority: 5
    min_total_error: 3
    emoji: "🔶"
    description: "Acertou o vencedor e o nº de gols de um time, com erro > 2"
    color_text: "#ffcc00"
  - name: "6-Vencedor correto"
    rule: "correct_winner"
    points: 5
    priority: 6
    emoji: "✔️"
    description: "Acertou apenas o vencedor da partida"
    color_text: "#ffcc00"
  - name: "7-Qualquer outro empate"
    rule: "correct_draw"
    points: 5
    priority: 7
    emoji: "⚖️"
    description: "Acertou o empate, mas com erro > 2"
    color_text: "#ffcc00"
  - name: "8-Gols de um time"
    rule: "one_team_goals"
    points: 1
    priority: 8
    emoji: "👊"
    description: "Acertou o nº de gols de um time, mas não o vencedor"
    color_text: "#ff9900"
  - name: "9-Nenhum acerto"
    rule: "no_score"
    points: 0
    priority: 9
    emoji: "❌"
    description: "Não acertou nenhum dos critérios"
    color_text: "#ff3333"
  - name: "99-Sem jogo"
    rule: "missing_data"
    points: 0
    priority: 99
    emoji: "❓"
    description: "Partida não realizada ou sem palpite"
    color_text: "#888888"


# Excel parsing layout
excel_layout:
  first_round:
    matches: 72
    skiprows: 2
  playoffs:
    striker_row_offset: 1
    striker_label: "Artilheiro"
    striker_name_column: 2
    striker_name_fallback_column: 8
    champion_cell: "M119"
    name_split_char: "-"
    name_split_index: 0
    playoffs_sheet_name: "Tabela Jogos"
    skiprows: 1
    rounds:
      - name: "Segunda Fase"
        key: "segunda_fase"
        matches: 16
        tail_offset: 33
      - name: "Oitavas de Final"
        key: "oitavas"
        matches: 8
        tail_offset: 17
      - name: "Quartas de Final"
        key: "quartas"
        matches: 4
        tail_offset: 9
      - name: "Semifinal"
        key: "semi"
        matches: 2
        tail_offset: 5
      - name: "Disputa 3\u00ba Lugar"
        key: "terceiro_lugar"
        matches: 1
        tail_offset: 3
      - name: "Final"
        key: "final"
        matches: 1
        tail_offset: 2

