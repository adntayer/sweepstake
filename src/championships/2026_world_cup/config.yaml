# Championship: 2026 FIFA World Cup
id: 2026_world_cup
name: "2026 World Cup"
year: 2026
timezone: "America/Sao_Paulo"
report_title: "2026 World Cup"
group_phase_label: "1afase"

# 2026 uses group standings format (not individual match predictions)
standings_format: true
standings_skiprows: 1

# All paths (relative to project root)
base_dir: "src/championships/2026_world_cup/data"
raw_dir: "src/championships/2026_world_cup/data/raw"
results_file: "src/championships/2026_world_cup/data/games.csv"
