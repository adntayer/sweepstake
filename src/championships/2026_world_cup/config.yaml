# Playoff bonus scoring (per correct pick per phase)
playoff_scoring:
  segunda_fase: 4
  oitavas: 8
  quartas: 12
  semi: 20
  final: 30
  # campeao: 45  # reserved for future champion bonus pick

# Striker scoring (points if player's pick matches actual_top_scorer)
striker_scoring:
  points: 25

# Actual top scorer of the championship
actual_top_scorer: "Harry Kane"

# Scoring rules (checked in rule order)
scoring:
  - name: "1-Placar exato"
    rule: "exact_score"
    points: 15
    emoji: "\U0001f3af"
    color_text: "#00cc00"
  - name: "2-Vencedor + acerto parcial"
    rule: "correct_winner_and_goals_or_diff"
    points: 10
    max_total_error: 2
    emoji: "\u26bd"
    color_text: "#66ff66"
  - name: "3-Vencedor + acerto parcial"
    rule: "correct_winner_and_goals_or_diff"
    points: 7
    min_total_error: 3
    emoji: "\u26bd"
    color_text: "#66ff66"
  - name: "4-Vencedor correto"
    rule: "correct_winner"
    points: 5
    emoji: "\u2705"
    color_text: "#ffcc00"
  - name: "5-Gols de um time"
    rule: "one_team_goals"
    points: 1
    emoji: "\U0001f44a"
    color_text: "#ff9900"
  - name: "6-Nenhum acerto"
    rule: "no_score"
    points: 0
    emoji: "\u274c"
    color_text: "#ff3333"
  - name: "9-Sem jogo"
    rule: "missing_data"
    points: 0
    priority: 99
    emoji: "\u2753"
    color_text: "#888888"

# Excel parsing layout
excel_layout:
  first_round:
    matches: 72
    skiprows: 2
  playoffs:
    striker_row_offset: 1
    striker_label: "Artilheiro"
    striker_name_column: 2
    striker_name_fallback_column: 8
    name_split_char: "-"
    name_split_index: 0
    playoffs_sheet_name: "Tabela Jogos"
    rounds:
      - name: "2a Fase"
        key: "segunda_fase"
        matches: 16
        tail_offset: 33
      - name: "Oitavas"
        key: "oitavas"
        matches: 8
        tail_offset: 17
      - name: "Quartas"
        key: "quartas"
        matches: 4
        tail_offset: 9
      - name: "Semi"
        key: "semi"
        matches: 2
        tail_offset: 5
      - name: "Disputa 3\u00ba Lugar"
        key: "terceiro_lugar"
        matches: 1
        tail_offset: 3
      - name: "Final"
        key: "final"
        matches: 1
        tail_offset: 2

