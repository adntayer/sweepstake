# Actual top scorer of the championship
actual_top_scorer: "Haaland"

# Playoff bonus scoring (per correct pick per phase)
playoff_scoring:
  oitavas: 3
  quartas: 5
  semi: 8
  final: 12

# Striker scoring (points if player's pick matches actual_top_scorer)
striker_scoring:
  points: 30

# Scoring rules (checked in rule order)
# Colors reference theme section below
scoring:
  - name: "1-Placar exato"
    rule: "exact_score"
    points: 12
    emoji: "\U0001f3af"
    color_text: "#00cc00"
  - name: "2-Vencedor + gols de um time"
    rule: "correct_winner_and_goals"
    points: 7
    emoji: "\u26bd"
    color_text: "#66ff66"
  - name: "3-Vencedor correto"
    rule: "correct_winner"
    points: 5
    emoji: "\u2705"
    color_text: "#ffcc00"
  - name: "4-Gols de um time"
    rule: "one_team_goals"
    points: 1
    emoji: "\U0001f44a"
    color_text: "#ff9900"
  - name: "5-Nenhum acerto"
    rule: 'no_score'
    points: 0
    emoji: "\u274c"
    color_text: "#ff3333"
  - name: "9-Sem jogo"
    rule: "missing_data"
    points: 0
    priority: 99
    emoji: "\u2753"
    color_text: "#888888"

# Excel parsing layout
excel_layout:
  first_round:
    matches: 48
    skiprows: 2
  playoffs:
    striker_row_offset: 1
    name_split_char: "-"
    name_split_index: 1
    rounds:
      - name: "Oitavas"
        key: "oitavas"
        matches: 8
        tail_offset: 19
      - name: "Quartas"
        key: "quartas"
        matches: 4
        tail_offset: 10
      - name: "Semi"
        key: "semi"
        matches: 2
        tail_offset: 5
      - name: "Final"
        key: "final"
        matches: 1
        tail_offset: 2

